version: '3.9'

# Sprint 5+: Postgres removed — dev DB is GCP Cloud SQL.
# Run scripts/proxy-up.sh before starting backend locally.
# DATABASE_URL is injected via env (loaded from GCP Secret Manager via scripts/setup-env.sh).

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bdt-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: bdt-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
