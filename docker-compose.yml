version: '3.9'

# Local dev: start postgres with `docker compose up -d postgres`
# Production uses GCP Cloud Run + Cloud SQL (see .github/workflows/deploy-backend.yml)

services:
  postgres:
    image: postgres:16-alpine
    container_name: bdt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: BdtDev2026!
      POSTGRES_DB: bdt_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bdt-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: bdt-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
