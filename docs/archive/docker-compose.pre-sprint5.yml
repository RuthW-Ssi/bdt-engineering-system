version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bdt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bdt
      POSTGRES_USER: bdt
      POSTGRES_PASSWORD: bdt_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bdt -d bdt"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bdt-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bdt:bdt_pass@postgres:5432/bdt?schema=public
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: bdt-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
