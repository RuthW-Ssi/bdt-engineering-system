name: Deploy Backend to Cloud Run

on:
  push:
    branches: [staging]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  PROJECT_ID: building-technology-493907
  REGION: asia-southeast1
  SERVICE: staging-bdt-engineering-service
  IMAGE: asia-southeast1-docker.pkg.dev/building-technology-493907/bdt-backend/staging-bdt-engineering-service

jobs:
  deploy:
    name: Build and deploy to Cloud Run
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            ./backend
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --set-secrets DATABASE_URL=supabase-staging-pooler-url:latest \
            --set-secrets DIRECT_URL=supabase-staging-direct-url:latest \
            --set-secrets JWT_SECRET=staging-bdt-engineering-jwt-secret:latest \
            --set-secrets ADMIN_SEED_PASSWORD=staging-bdt-engineering-admin-seed-password:latest \
            --set-env-vars NODE_ENV=production \
            --set-env-vars FILE_STORAGE_DRIVER=local \
            --set-env-vars FILE_STORAGE_LOCAL_PATH=/tmp/storage \
            --port 3000 \
            --min-instances 0 \
            --max-instances 3 \
            --memory 512Mi \
            --cpu 1 \
            --allow-unauthenticated

      - name: Route traffic to new revision
        run: |
          gcloud run services update-traffic ${{ env.SERVICE }} \
            --to-latest \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }}

      - name: Show service URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format "value(status.url)"
